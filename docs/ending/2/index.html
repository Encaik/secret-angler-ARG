</style></head> <body data-astro-cid-3jnavrc4> <div class="ending" data-astro-cid-3jnavrc4> <h2 data-astro-cid-3jnavrc4>孤 军 救 人</h2> <p data-astro-cid-3jnavrc4>你提交了基地坐标和薄弱点位的线索。警方连夜组织了突袭。</p> <p data-astro-cid-3jnavrc4>矿道深处的关押区被找到时，沈辞还活着。四天没有进食，严重脱水，但活着。他被救援队抬出矿道的时候，眯着眼睛看太阳——他已经将近两周没见过自然光了。</p> <p data-astro-cid-3jnavrc4>但是另外三个关押区已经空了。团伙在你触发警报后启动了48小时撤离预案。其余受害者被转运到了下一个据点。暗网市场换了域名，两天后重新上线。</p> <p data-astro-cid-3jnavrc4>沈辞在医院里跟你说："你救了我。但那里还有别人。"</p> <div class="divider" data-astro-cid-3jnavrc4>···</div> <p class="final" data-astro-cid-3jnavrc4>你做了能做的一切——但这不够。<br data-astro-cid-3jnavrc4>有些人的失踪，连证据都没留下。</p> <p class="final" style="margin-top:24px;" data-astro-cid-3jnavrc4><a href="/secret-angler-ARG/home/" data-astro-cid-3jnavrc4>重新开始</a></p> </div> </body></html>
